# Blender 4.x "Default" dark editor look — neutral greys, blue selection.
# Reference: Blender's release/datafiles/userdef/userdef_default_theme.c and
# the imgui-theme showcase (https://github.com/ocornut/imgui/issues/707).

alpha = 1.0
disabledAlpha = 0.5
windowPadding = [8.0, 8.0]
windowRounding = 0.0
windowBorderSize = 1.0
windowMinSize = [32.0, 32.0]
windowTitleAlign = [0.0, 0.5]
windowMenuButtonPosition = "None"
childRounding = 4.0
childBorderSize = 1.0
popupRounding = 4.0
popupBorderSize = 1.0
framePadding = [6.0, 3.0]
menuItemPadding = [70.0, 0.0]
frameRounding = 3.0
frameBorderSize = 0.0
itemSpacing = [6.0, 4.0]
itemInnerSpacing = [4.0, 4.0]
cellPadding = [4.0, 2.0]
indentSpacing = 18.0
columnsMinSpacing = 6.0
scrollbarSize = 12.0
scrollbarRounding = 6.0
grabMinSize = 8.0
grabRounding = 3.0
tabRounding = 4.0
tabBorderSize = 0.0
tabMinWidthForCloseButton = 0.0
colorButtonPosition = "Right"
buttonTextAlign = [0.5, 0.5]
selectableTextAlign = [0.0, 0.5]

